name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      id-token: write # Required for OIDC
      contents: write # for softprops/action-gh-release to create GitHub release

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify package.json version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          # strip 'v' prefix if present (handle both 1.21.9 and v1.21.9)
          TAG_VERSION=${TAG_VERSION#v}
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install packages
        run: bun install --frozen-lockfile
      - name: Check formatting
        run: bun run format
      - name: Lint
        run: bun run lint
      - name: Build distribution files
        run: bun run dist
      - name: Publish to npm
        run: npm publish --provenance --access public
      - name: Generate debug outputs
        run: |
          bun run debug all
      - name: Create release archives
        run: |
          cd dist
          zip -r ../package.zip .
          cd ..

          zip -r debug-visualizations.zip debug/*.html

          PACKAGE_VERSION=$(jq -r '.version' package.json)
          if [ -f "debug/debug-${PACKAGE_VERSION}.html" ]; then
            cp "debug/debug-${PACKAGE_VERSION}.html" debug-latest.html
            echo "Using debug-${PACKAGE_VERSION}.html as latest"
          else
            # Fallback to most recent file
            LATEST_DEBUG=$(ls -t debug/debug-*.html | head -n1)
            cp "$LATEST_DEBUG" debug-latest.html
            echo "Using $LATEST_DEBUG as latest"
          fi

          ls -lh package.zip debug-visualizations.zip debug-latest.html
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            package.zip
            debug-visualizations.zip
            debug-latest.html
